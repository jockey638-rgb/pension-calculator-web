<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#2F5496">
  <meta name="robots" content="noindex,nofollow">
  <title>🔒 연금 포트폴리오 (2026-06-02)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #2F5496 0%, #1a2b4a 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .gate {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      padding: 38px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }
    .gate .lock { font-size: 52px; margin-bottom: 14px; }
    .gate h1 { font-size: 19px; margin-bottom: 6px; font-weight: 700; }
    .gate .sub { font-size: 12.5px; opacity: 0.85; margin-bottom: 22px; line-height: 1.5; }
    .gate input {
      width: 100%;
      padding: 13px 16px;
      font-size: 16px;
      background: rgba(255,255,255,0.95);
      color: #1a2b4a;
      border: none;
      border-radius: 10px;
      margin-bottom: 12px;
      font-family: inherit;
      text-align: center;
      letter-spacing: 2px;
      font-weight: 700;
    }
    .gate input:focus {
      outline: 3px solid #4F8DD9;
    }
    .gate button {
      width: 100%;
      padding: 13px;
      background: #4F8DD9;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.05s;
    }
    .gate button:hover { background: #5B9EE0; }
    .gate button:active { transform: scale(0.98); }
    .gate button:disabled { background: #6B7280; cursor: wait; }
    .gate .err {
      color: #FCA5A5;
      font-size: 12.5px;
      margin-top: 12px;
      min-height: 18px;
      font-weight: 600;
    }
    .gate .info {
      font-size: 11px;
      opacity: 0.65;
      margin-top: 22px;
      line-height: 1.5;
    }
    .gate .info b { color: #C5DCFF; }
    /* 로딩 표시 */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

    async function unlock() {
      const pw = document.getElementById('pw').value;
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');
      err.textContent = '';
      if (!pw) { err.textContent = '⚠️ 비밀번호를 입력해주세요'; return; }

        const html = await decrypt(pw, PAYLOAD);

        document.close();

        btn.disabled = false;
        btn.innerHTML = '🔓 열기';
        err.textContent = '❌ 비밀번호가 틀렸습니다';
        document.getElementById('pw').select();
      }
    }

      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: salt, iterations: p.iter, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );

      // AES-GCM 복호화 (인증 실패 시 throw)
      const plain = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: iv },
        key,
        ct
      );
      return new TextDecoder('utf-8').decode(plain);
    }

    function b64d(s) {
      return Uint8Array.from(atob(s), c => c.charCodeAt(0));
    }
  </script>
